<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏪 ETF Ki Dukaan</title>
<style>
:root {
  --bg:#0A0A0B;--bg2:#111114;--bg3:#18181C;--bg4:#1E1E24;
  --border:rgba(255,255,255,0.13);--border-mid:rgba(255,255,255,0.18);
  --text:#F0EEE8;--muted:#787672;
  --green:#4CAF82;--green-dim:rgba(76,175,130,0.12);
  --red:#E05252;--red-dim:rgba(224,82,82,0.12);
  --amber:#E8A440;--yellow:#F5C842;--yellow-dim:rgba(245,200,66,0.15);
  --blue:#5B9BD5;--blue-dim:rgba(91,155,213,0.15);
  --font:'Segoe UI',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:54px;font-family:var(--font);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes pickGlow{from{box-shadow:0 0 20px rgba(245,200,66,.1)}to{box-shadow:0 0 45px rgba(245,200,66,.28)}}
@keyframes sellGlow{from{box-shadow:0 0 15px rgba(224,82,82,.1)}to{box-shadow:0 0 40px rgba(224,82,82,.3)}}
@keyframes lPulseR{from{box-shadow:0 0 8px rgba(224,82,82,.4)}to{box-shadow:0 0 22px rgba(224,82,82,.9)}}
@keyframes sparkCenter{0%{opacity:.6;transform:translate(-50%,-50%) scale(.85)}100%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}

.header{background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:60;}
.btn-back{background:var(--bg3);border:2px solid var(--border-mid);color:var(--muted);border-radius:10px;padding:6px 14px;font-size:.72rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.15s;}
.btn-back:hover{border-color:var(--yellow);color:var(--yellow);}
.header-title{font-size:1.05rem;font-weight:700;flex:1;}
.header-title .shop{color:var(--yellow);}
.scan-status{display:flex;align-items:center;gap:6px;font-size:.62rem;color:var(--muted);}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.s-dot.scanning{background:var(--amber);animation:blink .8s infinite;}
.s-dot.error{background:var(--red);}

.scan-bar{background:var(--bg2);border-bottom:2px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn-scan{display:inline-flex;align-items:center;gap:6px;border:2px solid;border-radius:20px;padding:6px 16px;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;white-space:nowrap;}
.btn-scan:disabled{opacity:.4;cursor:not-allowed;}
.btn-master{border-color:rgba(91,155,213,.5);color:var(--blue);}
.btn-master:not(:disabled):hover{background:var(--blue-dim);border-color:var(--blue);}
.btn-rsi{border-color:rgba(245,200,66,.5);color:var(--yellow);}
.btn-rsi:not(:disabled):hover{background:var(--yellow-dim);border-color:var(--yellow);}
.btn-reset{border-color:rgba(224,82,82,.4);color:var(--red);}
.btn-reset:not(:disabled):hover{background:var(--red-dim);border-color:var(--red);}
.scan-meta{font-size:.6rem;color:var(--muted);flex:1;line-height:1.8;}
.scan-meta span{color:var(--text);}

.prog-wrap{background:var(--bg3);border-bottom:2px solid var(--border);padding:10px 20px;display:none;}
.prog-wrap.show{display:block;}
.prog-outer{background:var(--bg4);border-radius:8px;height:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:5px;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--yellow),var(--amber));border-radius:8px;transition:width .3s;}
.prog-txt{font-size:.6rem;color:var(--muted);}

.debug-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin:10px 20px;display:none;max-height:150px;overflow-y:auto;}
.debug-box.show{display:block;}
.dl{font-size:.58rem;color:var(--muted);line-height:1.9;font-family:monospace;}
.dl.ok{color:var(--green);}
.dl.err{color:var(--red);}
.dl.warn{color:var(--amber);}

.main{padding:16px 20px;display:flex;flex-direction:column;gap:6px;}
.section-hd{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:14px 0 10px;}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border);}
.section-badge{font-size:.6rem;padding:2px 9px;border-radius:8px;background:var(--yellow-dim);color:var(--yellow);}

.pick-card{background:var(--bg2);border:3px solid rgba(245,200,66,.65);border-radius:16px;overflow:hidden;animation:pickGlow 2s infinite alternate;margin-bottom:4px;position:relative;}
.pick-star{position:absolute;top:11px;right:12px;background:var(--yellow);color:#111;border-radius:20px;padding:3px 10px;font-size:.6rem;font-weight:700;}
.pick-top{padding:14px 16px 8px;}
.pick-name{font-size:1rem;color:var(--yellow);font-weight:700;}
.pick-sub{font-size:.62rem;color:var(--muted);margin-top:2px;}
.pick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 16px;}
.pst{text-align:center;}
.pst-lbl{font-size:.55rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.pst-val{font-size:.95rem;margin-top:2px;font-weight:700;}
.rsi-bar-wrap{padding:6px 16px 4px;}
.rsi-bar-out{background:var(--bg3);border-radius:8px;height:10px;overflow:hidden;border:1px solid var(--border);}
.rsi-bar-in{height:100%;border-radius:8px;background:linear-gradient(90deg,#E05252,#F5A742);transition:width .5s;}
.rsi-bar-lbls{display:flex;justify-content:space-between;font-size:.52rem;color:var(--muted);margin-top:4px;}
.pick-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px 14px;}

.no-pick{background:var(--bg2);border:2px solid var(--border);border-radius:14px;padding:28px;text-align:center;margin-bottom:4px;}
.no-pick-icon{font-size:2rem;display:block;margin-bottom:8px;}
.no-pick-msg{font-size:.78rem;color:var(--muted);line-height:2;}
.no-pick-msg strong{color:var(--text);}

.wl-grid{display:flex;flex-direction:column;gap:7px;}
.wl-row{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;transition:border-color .2s;}
.wl-row:hover{border-color:rgba(245,200,66,.3);}
.wl-row.held-row{opacity:.65;border-color:rgba(76,175,130,.3);}
.wl-rank{font-size:.68rem;color:var(--muted);width:22px;flex-shrink:0;text-align:center;}
.wl-info{flex:1;min-width:0;}
.wl-name{font-size:.8rem;color:var(--text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.wl-sym{font-size:.58rem;color:var(--muted);}
.wl-cat{font-size:.52rem;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:1px 7px;color:var(--muted);}
.held-badge{font-size:.52rem;background:rgba(76,175,130,.15);color:var(--green);border:1px solid rgba(76,175,130,.3);border-radius:5px;padding:1px 7px;}
.wl-rsi{text-align:right;flex-shrink:0;}
.wl-rsi-val{font-size:.95rem;color:var(--red);font-weight:700;}
.wl-rsi-lbl{font-size:.52rem;color:var(--muted);}
.wl-px{text-align:right;flex-shrink:0;min-width:68px;}
.wl-px-val{font-size:.75rem;color:var(--text);font-weight:700;}
.wl-chg{font-size:.6rem;}
.wl-chg.up{color:var(--green);}
.wl-chg.dn{color:var(--red);}

.hc{background:var(--bg2);border:3px solid rgba(76,175,130,.45);border-radius:14px;overflow:hidden;margin-bottom:6px;}
.hc.sell-active{border-color:rgba(224,82,82,.72);animation:sellGlow 1.5s infinite alternate;}
.hc-top{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 8px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
.hc-name-col{display:flex;flex-direction:column;gap:2px;}
.hc-name{font-size:.88rem;color:var(--text);font-weight:700;}
.hc-sym{font-size:.58rem;color:var(--muted);}
.hc-pnl{text-align:right;}
.hc-pnl-val{font-size:.9rem;font-weight:700;}
.hc-pnl-val.p{color:var(--green);}
.hc-pnl-val.l{color:var(--red);}
.hc-pnl-pct{font-size:.6rem;}
.hc-pnl-pct.p{color:rgba(76,175,130,.8);}
.hc-pnl-pct.l{color:rgba(224,82,82,.8);}
.hc-body{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;}
.hc-cell{text-align:center;}
.hc-cell-lbl{font-size:.52rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hc-cell-val{font-size:.8rem;color:var(--text);margin-top:2px;font-weight:700;}

.pb-wrap{margin:0 12px 10px;}
.pb-outer{position:relative;height:26px;background:#111;border-radius:13px;overflow:visible;border:1.5px solid rgba(100,80,20,.5);}
.pb-fill{position:absolute;top:2px;bottom:2px;left:50%;width:0%;background:linear-gradient(90deg,#7a5200,#DAA520,#FFD700,#FFF176,#FFD700);border-radius:11px;transition:width .45s;z-index:1;transform:translateX(-50%);}
.pb-fill.rd{transform:translateX(0%);border-radius:0 11px 11px 0;}
.pb-fill.ld{transform:translateX(-100%);border-radius:11px 0 0 11px;}
.pb-center{position:absolute;top:-2px;bottom:-2px;left:50%;width:3px;background:#FFD700;transform:translateX(-50%);z-index:3;border-radius:2px;}
.pb-clbl{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);font-size:.68rem;background:#1a1500;padding:3px 11px;border-radius:20px;white-space:nowrap;color:#FFD700;border:1.5px solid rgba(255,215,0,.5);z-index:10;pointer-events:none;}
.pb-lbls{display:flex;justify-content:space-between;font-size:.62rem;margin-top:8px;padding:0 2px;}
.pb-lbl-sell{color:#FFE082;padding:3px 8px;border-radius:6px;transition:all .3s;border:1px solid transparent;}
.pb-lbl-sell.hit{background:rgba(224,82,82,.2);color:var(--red);border-color:var(--red);animation:lPulseR .9s infinite alternate;}

.sell-row{padding:8px 14px 10px;background:rgba(224,82,82,.08);border-top:1px solid rgba(224,82,82,.22);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.sell-row-txt{font-size:.68rem;color:var(--red);font-weight:700;}
.sell-row-sub{font-size:.6rem;color:rgba(224,82,82,.8);}

.btn-buy,.btn-sell,.btn-sell-now{border:none;border-radius:10px;padding:10px 14px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-buy{background:var(--green);color:#000;}
.btn-buy:hover{background:#62D49B;transform:translateY(-1px);}
.btn-buy:disabled{background:var(--bg3);color:var(--muted);border:2px solid var(--border);cursor:not-allowed;transform:none;}
.btn-sell{background:var(--bg3);color:var(--muted);border:2px solid var(--border);}
.btn-sell-now{background:var(--red);color:#fff;font-size:.72rem;padding:6px 14px;border-radius:8px;}

.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.86);backdrop-filter:blur(9px);z-index:110;display:none;align-items:center;justify-content:center;padding:20px;}
.m-overlay.show{display:flex;}
.m-box{background:var(--bg2);border:2px solid rgba(245,200,66,.45);border-radius:18px;padding:22px;max-width:340px;width:100%;animation:pop .2s ease;}
.m-title{font-size:1rem;color:var(--yellow);margin-bottom:14px;text-align:center;font-weight:700;}
.m-info{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;flex-direction:column;gap:6px;}
.mi-row{display:flex;justify-content:space-between;font-size:.72rem;}
.mi-k{color:var(--muted);}
.mi-v{color:var(--text);}
.m-field{margin-bottom:12px;}
.m-field label{display:block;font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.m-field input{width:100%;background:var(--bg3);border:2px solid var(--border-mid);border-radius:9px;color:var(--text);font-size:.95rem;font-weight:700;padding:8px 12px;outline:none;text-align:center;transition:.15s;}
.m-field input:focus{border-color:var(--yellow);}
.m-field input[readonly]{background:var(--bg4);color:var(--muted);cursor:not-allowed;border-color:var(--border);}
.m-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-m-cancel{background:var(--bg3);color:var(--muted);border:2px solid var(--border);border-radius:10px;padding:10px;font-size:.8rem;font-weight:700;cursor:pointer;}
.btn-m-buy{background:var(--green);color:#000;border:none;border-radius:10px;padding:10px;font-size:.8rem;font-weight:700;cursor:pointer;}
.btn-m-sell{background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px;font-size:.8rem;font-weight:700;cursor:pointer;}

.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:2px solid var(--border-mid);color:var(--text);font-size:.72rem;padding:8px 18px;border-radius:10px;z-index:300;transition:transform .25s;white-space:nowrap;max-width:92vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.log-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:6px;overflow-x:auto;z-index:50;height:38px;}
.log-bar::-webkit-scrollbar{height:0;}
.lchip{flex-shrink:0;font-size:.6rem;border-radius:5px;padding:2px 8px;white-space:nowrap;}
.lchip.buy{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,130,.25);}
.lchip.sell{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.22);}
.log-empty{font-size:.6rem;color:var(--muted);}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="btn-back">← Dashboard</a>
  <div class="header-title">🏪 <span class="shop">ETF Ki Dukaan</span></div>
  <div class="scan-status"><div class="s-dot" id="sDot"></div><span id="sTxt">Ready</span></div>
</div>

<div class="scan-bar">
  <button class="btn-scan btn-master" id="btnMaster" onclick="runMasterScan()">🔎 Master List Banao</button>

</div>

<div class="prog-wrap" id="progWrap">

  <div class="prog-txt" id="progTxt">Scanning…</div>
</div>
<div class="debug-box" id="debugBox"></div>

<div class="main" id="mainContent">
  <div class="no-pick" style="margin-top:10px;">
    <span class="no-pick-icon">🏪</span>
    <div class="no-pick-msg">
      <strong>Welcome to ETF Ki Dukaan!</strong><br><br>
      1️⃣ <strong>Master List Banao</strong> — ek baar karo<br>
      2️⃣ <strong>RSI Scan Karo</strong> — roz karo<br>

<div class="m-overlay" id="tradeModal">

    <div class="m-title" id="mTitle">Trade</div>

</div>

<div class="toast" id="toast"></div>
<div class="log-bar" id="logBar"><span class="log-empty">Trades yahaan dikhenge…</span></div>

<script>
/* ══════════════════════════════════════════
   ETF UNIVERSE  (Gold / Silver EXCLUDED)
   NSE symbols without .NS suffix for APIs
   ══════════════════════════════════════════ */
const ETF_UNIVERSE = [
  {sym:'NIFTYBEES',  name:'Nifty BeES',          cat:'nifty50',     label:'Nifty 50'},
  {sym:'SETFNIF50',  name:'SBI Nifty 50 ETF',    cat:'nifty50b',    label:'Nifty 50'},
  {sym:'KOTAKNIFTY', name:'Kotak Nifty 50',       cat:'nifty50c',    label:'Nifty 50'},
  {sym:'HDFCNIFETF', name:'HDFC Nifty 50',        cat:'nifty50d',    label:'Nifty 50'},
  {sym:'JUNIORBEES', name:'Junior BeES',           cat:'next50',      label:'Nifty Next 50'},
  {sym:'SETFNN50',   name:'SBI Nifty Next 50',    cat:'next50b',     label:'Nifty Next 50'},
  {sym:'MOM100',     name:'Motilal Midcap 100',   cat:'midcap100',   label:'Midcap 100'},
  {sym:'MID150BEES', name:'Midcap 150 BeES',      cat:'midcap150',   label:'Midcap 150'},
  {sym:'HDFCMID150', name:'HDFC Midcap 150',      cat:'midcap150b',  label:'Midcap 150'},
  {sym:'SETFSMALLCAP',name:'SBI Smallcap ETF',    cat:'smallcap',    label:'Smallcap'},
  {sym:'BANKBEES',   name:'Bank BeES',             cat:'bank',        label:'Bank Nifty'},
  {sym:'SETFBANK',   name:'SBI Bank ETF',          cat:'bankb',       label:'Bank Nifty'},
  {sym:'KOTAKBKETF', name:'Kotak Bank ETF',        cat:'bankc',       label:'Bank Nifty'},
  {sym:'PSUBNKBEES', name:'PSU Bank BeES',         cat:'psubank',     label:'PSU Bank'},
  {sym:'SETFPBANK',  name:'SBI PSU Bank ETF',      cat:'psubankb',    label:'PSU Bank'},
  {sym:'ITBEES',     name:'IT BeES',               cat:'it',          label:'Nifty IT'},
  {sym:'PHARMABEES', name:'Pharma BeES',           cat:'pharma',      label:'Pharma'},
  {sym:'INFRABEES',  name:'Infra BeES',            cat:'infra',       label:'Infra'},
  {sym:'SETFINFRA',  name:'SBI Infra ETF',         cat:'infrab',      label:'Infra'},
  {sym:'AUTOBEES',   name:'Auto BeES',             cat:'auto',        label:'Auto'},
  {sym:'SETFPSE',    name:'SBI PSE ETF',           cat:'pse',         label:'PSE/PSU'},
  {sym:'KOTAKPSE',   name:'Kotak PSE ETF',         cat:'pseb',        label:'PSE/PSU'},
  {sym:'CONSIETF',   name:'Consumption ETF',       cat:'consumption', label:'Consumption'},
  {sym:'DIVOPPBEES', name:'Dividend Opp BeES',     cat:'dividend',    label:'Dividend'},
  {sym:'N100',       name:'Motilal Nasdaq 100',    cat:'nasdaq100',   label:'Nasdaq 100'},
  {sym:'MAFANG',     name:'Motilal FANG+',         cat:'fang',        label:'FANG+'},
  {sym:'HNGSNGBEES', name:'Hang Seng BeES',        cat:'hangseng',    label:'Hang Seng'},
];

/* ══════════════════════════════════════════
   DATA SOURCES  — tried in order
   1. Groww public API  (no auth, no CORS)
   2. NSE India CSV feed
   3. Yahoo Finance v8 via best proxy
   ══════════════════════════════════════════ */

// ── Source 1: Groww search API ──────────────────────────────
async function growwQuote(sym) {
  // Groww search gives last price, % change
  const url = `https://groww.in/v1/api/search/v3/query/global/st_query?query=${sym}&page=0&size=1&entity_type=STOCK`;
  const r = await fetch(url, {signal: AbortSignal.timeout(8000), headers:{'Accept':'application/json'}});
  if (!r.ok) throw new Error('groww HTTP '+r.status);
  const d = await r.json();
  const item = d?.data?.content?.[0];
  if (!item || !item.search_id) throw new Error('groww no result');
  // second call for quote
  const url2 = `https://groww.in/v1/api/stocks/v2/tr_live_data/exchange/NSE/segment/CASH/${item.search_id}/latest`;
  const r2 = await fetch(url2, {signal: AbortSignal.timeout(8000), headers:{'Accept':'application/json'}});
  if (!r2.ok) throw new Error('groww quote HTTP '+r2.status);
  const d2 = await r2.json();
  if (!d2?.ltp) throw new Error('groww no ltp');
  return { price: d2.ltp, changePct: d2.dayChangePerc || 0, change: d2.dayChange || 0, volume: d2.volume || 0 };
}

// ── Source 2: NSEIndia public JSON ──────────────────────────
async function nseQuote(sym) {
  // NSE's public quote endpoint (no login, but needs correct cookie sometimes)
  const url = `https://www.nseindia.com/api/quote-equity?symbol=${encodeURIComponent(sym)}&series=EQ`;
  const r = await fetch(url, {
    signal: AbortSignal.timeout(9000),
    headers: {
      'Accept': 'application/json',
      'Accept-Language': 'en-US,en;q=0.9',
      'Referer': 'https://www.nseindia.com/'
    }
  });
  if (!r.ok) throw new Error('nse HTTP '+r.status);
  const d = await r.json();
  const q = d?.priceInfo;
  if (!q?.lastPrice) throw new Error('nse no price');
  return {
    price: q.lastPrice,
    changePct: q.pChange || 0,
    change: q.change || 0,
    volume: d?.securityWiseDP?.quantityTraded || 0
  };
}

// ── Source 3: Yahoo Finance via CORS proxies ─────────────────
const YF_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
let yfProxy = null;

async function yfQuote(sym) {
  const url = `https://query2.finance.yahoo.com/v8/finance/chart/${sym}.NS?interval=1d&range=2mo`;
  const tryP = async (pi) => {
    const r = await fetch(YF_PROXIES[pi](url), {signal: AbortSignal.timeout(12000), cache:'no-store'});
    if (!r.ok) throw new Error('yf proxy HTTP '+r.status);
    const txt = await r.text();
    if (!txt) throw new Error('empty');
    return JSON.parse(txt);
  };

  if (yfProxy !== null) {
    try { return await tryP(yfProxy); } catch(_) { yfProxy = null; }
  }
  for (let i=0; i<YF_PROXIES.length; i++) {
    try { const d=await tryP(i); yfProxy=i; return d; } catch(_) {}
  }
  throw new Error('all yf proxies failed');
}

async function yfHistorical(sym) {
  const d = await yfQuote(sym);
  const res = d?.chart?.result?.[0];
  if (!res) throw new Error('no chart result');
  const closes = (res.indicators?.quote?.[0]?.close||[]).filter(c=>c>0);
  if (closes.length < 16) throw new Error('too few candles: '+closes.length);
  const price  = closes[closes.length-1];
  const prev   = closes[closes.length-2]||price;
  return { closes, price, changePct:((price-prev)/prev)*100, change:price-prev, volume:0 };
}

/* ══════════════════════════════════════════
   UNIFIED FETCH — tries sources in order
   Returns { price, changePct, change, volume, closes? }
   ══════════════════════════════════════════ */
async function fetchQuote(sym) {
  const errs = [];

  // Try Groww first (fastest, no CORS)
  try {
    const d = await growwQuote(sym);
    dbg(`  [Groww] ${sym} ₹${d.price.toFixed(2)}`, 'ok');
    return { ...d, source:'groww' };
  } catch(e) { errs.push('Groww: '+e.message); }

  // Try NSE
  try {
    const d = await nseQuote(sym);
    dbg(`  [NSE] ${sym} ₹${d.price.toFixed(2)}`, 'ok');
    return { ...d, source:'nse' };
  } catch(e) { errs.push('NSE: '+e.message); }

  // Try Yahoo (also gets historical closes)
  try {
    const d = await yfHistorical(sym);
    dbg(`  [YF] ${sym} ₹${d.price.toFixed(2)}`, 'ok');
    return { ...d, source:'yf' };
  } catch(e) { errs.push('YF: '+e.message); }

  dbg(`  ✗ ${sym} all failed: ${errs.join(' | ')}`, 'err');
  return null;
}

async function fetchHistorical(sym) {
  // For RSI we need closes — try YF first (has history), else use price-only
  try {
    const d = await yfHistorical(sym);
    return d;
  } catch(_) {}

  // Fallback: single price point (RSI won't work but at least records exist)
  try {
    const d = await growwQuote(sym);
    return { closes: [d.price], price: d.price, changePct: d.changePct, change: d.change, volume: d.volume };
  } catch(_) {}

  try {
    const d = await nseQuote(sym);
    return { closes: [d.price], price: d.price, changePct: d.changePct, change: d.change, volume: d.volume };
  } catch(_) {}

  return null;
}

async function runMasterScan(){

}

/* ══════════════════════════════════════════
   RSI (Wilder 14)
   ══════════════════════════════════════════ */
function calcRSI(closes,period=14){
  if(!closes||closes.length<period+1)return null;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}
  let ag=g/period,al=l/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1],dg=d>0?d:0,dl=d<0?-d:0;
    ag=(ag*(period-1)+dg)/period;al=(al*(period-1)+dl)/period;
  }
  if(al===0)return 100;
  return parseFloat((100-100/(1+ag/al)).toFixed(2));
}

/* ══════════════════════════════════════════
   RSI SCAN
   ══════════════════════════════════════════ */
async function runRSIScan(){
  if(!S.masterList.length){showToast('⚠️ Pehle Master List banao!');return;}
  yfProxy=null;
  document.getElementById('debugBox').innerHTML='';
  setStatus('scanning','RSI scan…');setBtns(true);
  showProg(true,0,`RSI calc: ${S.masterList.length} ETFs…`);
  dbg('RSI scan shuru hua','ok');

  const heldSyms=new Set(S.holdings.map(h=>h.sym));
  const results=[];

  for(let i=0;i<S.masterList.length;i++){
    const etf=S.masterList[i];
    showProg(true,Math.round((i/S.masterList.length)*100),`[${i+1}/${S.masterList.length}] ${etf.name}…`);

    const d=await fetchHistorical(etf.sym);
    if(!d){await sleep(400);continue;}

    const closes=d.closes;
    const rsi=closes&&closes.length>=15?calcRSI(closes):null;

    if(rsi===null){
      dbg(`  skip ${etf.sym}: ${closes?.length||0} candles only (need 15+)`,'warn');
      // Still add with estimated RSI if we have a price — mark as "unknown"
      if(d.price>0){
        results.push({sym:etf.sym,name:etf.name,cat:etf.cat,label:etf.label,
          rsi:50,price:d.price,change:d.change||0,changePct:d.changePct||0,
          volume:etf.volume,held:heldSyms.has(etf.sym),rsiNA:true});
      }
      await sleep(400);continue;
    }

    results.push({sym:etf.sym,name:etf.name,cat:etf.cat,label:etf.label,
      rsi,price:d.price,change:d.change||0,changePct:d.changePct||0,
      volume:etf.volume,held:heldSyms.has(etf.sym)});
    dbg(`  ${etf.sym}: RSI ${rsi.toFixed(1)} ₹${d.price.toFixed(2)}`,rsi<30?'warn':'');
    await sleep(450);
  }

  results.sort((a,b)=>a.rsi-b.rsi);
  S.rsiResults=results;S.rsiDate=todayISO();

  const today=todayISO();
  const candidates=results.filter(r=>r.rsi<30&&!r.held&&!r.rsiNA);
  if(!(S.dailyPick&&S.dailyPick.date===today)&&candidates.length>0)
    S.dailyPick={sym:candidates[0].sym,date:today};

  showProg(false);save();
  const cnt=results.filter(r=>r.rsi<30&&!r.held&&!r.rsiNA).length;
  setStatus('','RSI done · '+cnt+' oversold');
  setBtns(false);updateMeta();renderMain();
  showToast(`✅ RSI scan done! ${cnt} ETFs RSI < 30`);
  dbg(`RSI scan done. ${results.length} ETFs scanned, ${cnt} oversold`,'ok');
}

function buildHoldingCard(h,curPx,pnl,pct,tgt,sellHit){
  const isP=pnl>=0,invested=h.buyPrice*h.units;
  const range=tgt-h.buyPrice;
  let fw=0,fd='';
  if(range>0){fw=Math.min(50,((curPx-h.buyPrice)/range)*50);if(fw>0)fd='rd';else if(fw<0){fw=Math.abs(fw);fd='ld';}}
  const rem=tgt>curPx?((tgt-curPx)/curPx*100).toFixed(2):'0';
  return `<div class="hc ${sellHit?'sell-active':''}">
    <div class="hc-top">
      <div class="hc-name-col"><div class="hc-name">${h.name}</div><div class="hc-sym">${h.sym} · ${h.units} Share · ${fmtDate(h.buyDate)}</div></div>
      <div class="hc-pnl"><div class="hc-pnl-val ${isP?'p':'l'}">${isP?'+':'-'}₹${Math.abs(pnl).toFixed(2)}</div><div class="hc-pnl-pct ${isP?'p':'l'}">${isP?'▲':'▼'} ${Math.abs(pct).toFixed(2)}%</div></div>
    </div>
    <div class="hc-body">
      <div class="hc-cell"><div class="hc-cell-lbl">Buy</div><div class="hc-cell-val">₹ ${h.buyPrice.toFixed(2)}</div></div>
      <div class="hc-cell"><div class="hc-cell-lbl">Current</div><div class="hc-cell-val">₹ ${curPx.toFixed(2)}</div></div>
      <div class="hc-cell"><div class="hc-cell-lbl">Invested</div><div class="hc-cell-val">₹ ${Math.round(invested).toLocaleString('en-IN')}</div></div>
    </div>
    <div class="pb-wrap">
      <div class="pb-outer">
        <div class="pb-fill ${fd}" style="width:${Math.abs(fw)}%"></div>
        <div class="pb-center"></div>
        <div class="pb-clbl">₹ ${h.buyPrice.toFixed(2)}</div>
      </div>
      <div class="pb-lbls"><span></span>
        <span class="pb-lbl-sell ${sellHit?'hit':''}">▲ Sell ₹${tgt.toFixed(2)} (+4.51%) ${sellHit?' 🎯 HIT!':`· ${rem}% baki`}</span>
      </div>
    </div>
    ${sellHit?`<div class="sell-row"><div class="sell-row-txt">🔴 SELL SIGNAL — +4.51% Target Hit!</div><div style="display:flex;align-items:center;gap:8px;"><span class="sell-row-sub">Profit: +₹${Math.abs(pnl).toFixed(2)}</span><button class="btn-sell-now" onclick="openModal('${h.sym}','${h.name.replace(/'/g,"\\'")}',${curPx},'sell')">💰 SELL NOW</button></div></div>`:''}
  </div>`;
}

function confirmTrade(){
  if(!pending)return;
  const{sym,name,type}=pending;
  const price=parseFloat(document.getElementById('tradePrice').value);
  const units=parseInt(document.getElementById('tradeUnits').value);
  if(!price||price<=0||!units||units<1){showToast('⚠️ Valid price aur units daalo!');return;}
  const today=todayISO(),time=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const rsiD=S.rsiResults.find(r=>r.sym===sym);
  if(type==='buy'){
    S.holdings=S.holdings.filter(h=>h.sym!==sym);
    S.holdings.push({sym,name,buyPrice:price,units,buyDate:today,buyTime:time,label:rsiD?.label||''});
    S.dailyPick={sym,date:today};
    S.rsiResults=S.rsiResults.map(r=>r.sym===sym?{...r,held:true}:r);
    addLog({type:'buy',sym,name,price,units,time});
    showToast(`✅ BOUGHT ${units} × ${name} @ ₹${price.toFixed(2)}`);
  }else{
    const h=S.holdings.find(x=>x.sym===sym);
    if(!h){showToast('⚠️ Holding nahi mili!');closeModal();return;}
    const pnl=(price-h.buyPrice)*h.units;
    addLog({type:'sell',sym,name,price,units:h.units,pnl,time});
    S.holdings=S.holdings.filter(x=>x.sym!==sym);
    S.rsiResults=S.rsiResults.map(r=>r.sym===sym?{...r,held:false}:r);
    if(S.dailyPick?.sym===sym&&S.dailyPick?.date===today)S.dailyPick=null;
    showToast(`✅ SOLD ${h.units} × ${name} @ ₹${price.toFixed(2)} | P&L: ${pnl>=0?'+':''}₹${pnl.toFixed(2)}`);
  }
  closeModal();save();renderMain();
}
function addLog(e){S.log.unshift(e);if(S.log.length>40)S.log.pop();renderLog();}
function renderLog(){
  const el=document.getElementById('logBar');
  if(!S.log.length){el.innerHTML='<span class="log-empty">Trades yahaan dikhenge…</span>';return;}
  el.innerHTML=S.log.slice(0,20).map(l=>`<div class="lchip ${l.type}">${l.type.toUpperCase()} ${l.units}× ${l.sym} @₹${l.price.toFixed(2)}${l.pnl!==undefined?(l.pnl>=0?' +₹':' -₹')+Math.abs(l.pnl).toFixed(2):''} · ${l.time}</div>`).join('');
}

window.onload=()=>{
  load();updateMeta();renderLog();
  if(S.rsiResults.length>0){
    renderMain();
    if(S.rsiDate!==todayISO()&&S.masterList.length>0)
      setTimeout(()=>{showToast('📊 Daily RSI scan shuru ho raha hai…',2500);runRSIScan();},2000);
  }else if(S.masterList.length>0){renderMain();setTimeout(runRSIScan,1000);}
  document.getElementById('tradeModal').addEventListener('click',e=>{if(e.target.id==='tradeModal')closeModal();});
};
</script>
</body>
